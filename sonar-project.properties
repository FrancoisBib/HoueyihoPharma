# SonarQube Configuration
# https://sonarsource.github.io/sonarcloud/advanced-setup/analysis-scope/

sonar.projectKey=houeyiho

# Source code
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.spec.ts

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# JavaScript
sonar.javascript.globals=window,globalThis,self

# Exclusions for build artifacts and generated files
sonar.coverage.exclusions=**/.next/**,**/out/**,**/build/**,**/dist/**,**/node_modules/**
