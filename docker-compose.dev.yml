version: '3.8'

# Development override - use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage for hot reload in development
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/houeyiho_dev?schema=public
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: bun run dev
    depends_on:
      db:
        condition: service_healthy
